<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball 2026 - Coin Store</title>
    <style>
        body { background-color: #0d1b2a; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { background: #1b263b; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #415a77; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #1b263b; border-radius: 12px; padding: 10px; border: 1px solid #415a77; }
        .coin-amount { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .coin-img { width: 100%; border-radius: 8px; }
        .btn-free { background: #3a86ff; color: white; border: none; padding: 8px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <span>eFootball™ 2026</span>
        <span style="color:#f1c40f">🟡 MyClub</span>
    </div>
    <div class="grid">
        <div class="card">
            <div class="coin-amount">🟡 300</div>
            <img src="https://raw.githubusercontent.com/nojo53/efootball-assets/main/coins300.png" class="coin-img">
            <button class="btn-free">FREE</button>
        </div>
        <div class="card">
            <div class="coin-amount">🟡 1,040</div>
            <img src="https://raw.githubusercontent.com/nojo53/efootball-assets/main/coins1040.png" class="coin-img">
            <button class="btn-free">FREE</button>
        </div>
        <div class="card">
            <div class="coin-amount">🟡 2,130</div>
            <img src="https://raw.githubusercontent.com/nojo53/efootball-assets/main/coins2130.png" class="coin-img">
            <button class="btn-free">FREE</button>
        </div>
        <div class="card">
            <div class="coin-amount">🟡 12,000</div>
            <img src="https://raw.githubusercontent.com/nojo53/efootball-assets/main/coins12000.png" class="coin-img">
            <button class="btn-free">FREE</button>
        </div>
    </div>
</body>
</html>
