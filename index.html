<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Gift</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #222; padding: 20px; border-radius: 15px; border: 2px solid #f1c40f; display: inline-block; width: 280px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background-color: #f1c40f; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#f1c40f">Free Coins</h2>
        <p>Login to claim 5000 Coins</p>
        <form>
            <input type="email" placeholder="Konami ID (Email)" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Claim Now</button>
        </form>
    </div>
</body>
</html>
